appId: com.pmusic.app
productName: PMusic
copyright: Copyright © 2026 PMusic

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

extraResources:
  - from: resources/
    to: .
    filter:
      - "ffmpeg*"
      - "icon.png"

asar: true
compression: maximum

asarUnpack:
  - "**/*.node"

win:
  target:
    - msi
    - nsis
  icon: resources/icon.png
  artifactName: ${productName}-Setup-${version}.${ext}

msi:
  oneClick: false
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PMusic
  warningsAsErrors: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PMusic
  differentialPackage: true

mac:
  target: dmg
  icon: resources/icon.icns
  category: public.app-category.music

linux:
  target: AppImage
  category: Audio

publish:
  provider: github
  owner: pufffissal
  repo: PMusic
